<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PêcheSN — Bateaux de pêche en temps réel · Littoral Sénégal</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ocean: #0077B6;
  --ocean-dark: #005f8a;
  --fishing: #FF6B35;
  --bg: #f0f4f7;
  --surface: #ffffff;
  --text: #1a1a2e;
  --muted: #5a6677;
  --border: #d0d7de;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  background: var(--ocean);
  color: white;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 1000;
  flex-shrink: 0;
  height: 52px;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo span { opacity: 0.6; font-weight: 400; }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 100%;
}

.filter-btn {
  padding: 6px 16px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.filter-btn:hover {
  border-color: rgba(255,255,255,0.6);
  color: white;
}
.filter-btn.active {
  background: white;
  color: var(--ocean);
  border-color: white;
}
.filter-btn.active.fishing-active {
  background: var(--fishing);
  color: white;
  border-color: var(--fishing);
}
.filter-btn .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.live-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  opacity: 0.7;
}
.live-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  animation: livePulse 2s infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}

/* ── MAP FRAME ── */
.map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.map-frame {
  width: 100%;
  height: 100%;
  border: none;
}

/* Loading overlay */
.loading-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: opacity 0.5s;
}
.loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--ocean);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-size: 14px;
  color: var(--muted);
}

/* ── FOOTER ── */
.info-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 24px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.info-bar a { color: var(--ocean); text-decoration: none; }
.info-bar a:hover { text-decoration: underline; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  header { padding: 0 12px; height: 48px; }
  .logo { font-size: 16px; }
  .logo span { display: none; }
  .filter-btn { padding: 5px 12px; font-size: 12px; }
  .filter-btn .filter-label { display: none; }
  .live-indicator { display: none; }
  .info-bar { font-size: 11px; padding: 6px 12px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    🎣 PêcheSN <span>· Littoral Sénégalais</span>
  </div>
  <div class="filter-bar">
    <button class="filter-btn" id="btn-all" onclick="setFilter('all')">
      🚢 <span class="filter-label">Tous les navires</span>
    </button>
    <button class="filter-btn active fishing-active" id="btn-fishing" onclick="setFilter('fishing')">
      🐟 <span class="filter-label">Pêche uniquement</span>
    </button>
    <div class="live-indicator">
      <span class="live-dot"></span> Live
    </div>
  </div>
</header>

<div class="map-container">
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Chargement des positions AIS…</div>
  </div>
  <iframe
    class="map-frame"
    id="map-frame"
    src="https://www.marinetraffic.com/en/ais/embed/zoom:7/centery:14.5/centerx:-17.2/maptype:1/shownames:true/showmenu:true/remember:false"
    loading="eager"
    allowfullscreen
  ></iframe>
</div>

<div class="info-bar">
  <span>Données AIS en temps réel via <a href="https://www.marinetraffic.com" target="_blank" rel="noopener">MarineTraffic</a></span>
  <span>·</span>
  <span>Utilisez le menu <strong>☰</strong> dans la carte pour des filtres avancés (type, pavillon, vitesse…)</span>
  <span>·</span>
  <span>Cliquez sur un navire pour voir ses détails</span>
</div>

<script>
const FRAME = document.getElementById('map-frame');
const LOADING = document.getElementById('loading');

// Base embed URLs
const URLS = {
  all: 'https://www.marinetraffic.com/en/ais/embed/zoom:7/centery:14.5/centerx:-17.2/maptype:1/shownames:true/showmenu:true/remember:false',
  fishing: 'https://www.marinetraffic.com/en/ais/embed/zoom:7/centery:14.5/centerx:-17.2/maptype:1/shownames:true/showmenu:true/remember:false/shiptype:30'
};

let currentFilter = 'fishing'; // Default to fishing

// Hide loading when iframe loads
FRAME.addEventListener('load', () => {
  setTimeout(() => LOADING.classList.add('hidden'), 500);
});

function setFilter(filter) {
  if (filter === currentFilter) return;
  currentFilter = filter;

  // Update buttons
  document.getElementById('btn-all').classList.toggle('active', filter === 'all');
  document.getElementById('btn-fishing').classList.toggle('active', filter === 'fishing');
  document.getElementById('btn-fishing').classList.toggle('fishing-active', filter === 'fishing');

  // Show loading
  LOADING.classList.remove('hidden');

  // Reload iframe with new URL
  FRAME.src = URLS[filter];
}

// Start with fishing filter
FRAME.src = URLS.fishing;
</script>
</body>
</html>
