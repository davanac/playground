<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gagner 15 000€ en un claquement de doigts</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a12;
  color: #fff;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
  position: relative;
}

/* ── BACKGROUND GLOW ── */
body::before {
  content: '';
  position: fixed;
  top: 50%; left: 50%;
  width: 600px; height: 600px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(255,215,0,0.06) 0%, transparent 70%);
  pointer-events: none;
  transition: all 0.6s;
}
body.active::before {
  width: 1200px; height: 1200px;
  background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
}

.content {
  text-align: center;
  z-index: 10;
  position: relative;
}

h1 {
  font-size: clamp(24px, 5vw, 42px);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-size: clamp(14px, 2.5vw, 18px);
  color: #666;
  margin-bottom: 48px;
  font-weight: 300;
}

/* ── SNAP BUTTON ── */
.snap-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: clamp(80px, 20vw, 160px);
  line-height: 1;
  transition: transform 0.15s;
  filter: drop-shadow(0 0 30px rgba(255,215,0,0.2));
  animation: pulse 2s ease-in-out infinite;
  position: relative;
}
.snap-btn:hover {
  transform: scale(1.1);
  filter: drop-shadow(0 0 50px rgba(255,215,0,0.4));
}
.snap-btn:active {
  transform: scale(0.9);
  animation: none;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

.snap-hint {
  margin-top: 24px;
  font-size: 13px;
  color: #444;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ── AMOUNT COUNTER ── */
.counter {
  position: fixed;
  top: 40px;
  right: 40px;
  font-size: clamp(28px, 5vw, 56px);
  font-weight: 900;
  color: #FFD700;
  text-shadow: 0 0 30px rgba(255,215,0,0.3);
  z-index: 50;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 0.5s, transform 0.5s;
  font-variant-numeric: tabular-nums;
}
.counter.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── BILLS RAIN ── */
.bill {
  position: fixed;
  top: -120px;
  font-size: 48px;
  z-index: 20;
  pointer-events: none;
  animation: fall linear forwards;
  will-change: transform;
}

@keyframes fall {
  0% {
    transform: translateY(0) rotate(0deg) scale(1);
    opacity: 1;
  }
  85% {
    opacity: 1;
  }
  100% {
    transform: translateY(calc(100vh + 200px)) rotate(var(--rot)) scale(var(--sc));
    opacity: 0;
  }
}

/* ── FLASH ── */
.flash {
  position: fixed;
  inset: 0;
  background: rgba(255,215,0,0.15);
  z-index: 100;
  pointer-events: none;
  animation: flashAnim 0.4s ease-out forwards;
}
@keyframes flashAnim {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* ── SHOCKWAVE ── */
.shockwave {
  position: fixed;
  top: 50%; left: 50%;
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 3px solid rgba(255,215,0,0.6);
  transform: translate(-50%, -50%) scale(0);
  z-index: 90;
  pointer-events: none;
  animation: shockAnim 0.8s ease-out forwards;
}
@keyframes shockAnim {
  to {
    transform: translate(-50%, -50%) scale(80);
    opacity: 0;
  }
}

/* ── SPARKLE PARTICLES ── */
.sparkle {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #FFD700;
  z-index: 80;
  pointer-events: none;
  animation: sparklePop 0.8s ease-out forwards;
}
@keyframes sparklePop {
  0% {
    transform: translate(0,0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--sx), var(--sy)) scale(0);
    opacity: 0;
  }
}

/* ── TOTAL REVEAL ── */
.total-reveal {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(10,10,18,0.95);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s;
}
.total-reveal.visible {
  opacity: 1;
  pointer-events: auto;
}
.total-reveal .amount {
  font-size: clamp(48px, 12vw, 120px);
  font-weight: 900;
  background: linear-gradient(135deg, #FFD700, #FF8C00, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: totalPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.total-reveal .congrats {
  font-size: clamp(16px, 3vw, 24px);
  color: #888;
  margin-top: 16px;
}
.total-reveal .restart {
  margin-top: 40px;
  padding: 14px 36px;
  background: transparent;
  border: 1px solid #333;
  border-radius: 4px;
  color: #888;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.total-reveal .restart:hover {
  border-color: #FFD700;
  color: #FFD700;
}

@keyframes totalPop {
  from { transform: scale(0.3); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ── MOBILE ── */
@media (max-width: 600px) {
  .counter { top: 20px; right: 20px; }
}
</style>
</head>
<body>

<div class="content">
  <h1>Gagner 15 000€<br>en un claquement de doigts</h1>
  <p class="subtitle">C'est aussi simple que ça.</p>
  <button class="snap-btn" id="snap" aria-label="Claquer des doigts">🫰</button>
  <p class="snap-hint" id="hint">Clique pour claquer</p>
</div>

<div class="counter" id="counter">0 €</div>

<div class="total-reveal" id="total-reveal">
  <div class="amount" id="total-amount"></div>
  <p class="congrats">Bravo, tu es riche.*</p>
  <p style="color:#333; margin-top:8px; font-size:13px;">*Les billets ne sont pas réels. Désolé.</p>
  <button class="restart" onclick="restart()">Recommencer</button>
</div>

<script>
const BILLS = ['💶','💶','💶','💵','💴','💷','💸','🤑'];
const TARGET = 15000;
const PER_SNAP = 500;

let total = 0;
let raining = false;
let snapCount = 0;

const snapBtn = document.getElementById('snap');
const counterEl = document.getElementById('counter');
const hintEl = document.getElementById('hint');
const totalReveal = document.getElementById('total-reveal');
const totalAmount = document.getElementById('total-amount');

function randomBetween(a, b) {
  return a + Math.random() * (b - a);
}

function createFlash() {
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  flash.addEventListener('animationend', () => flash.remove());
}

function createShockwave() {
  const sw = document.createElement('div');
  sw.className = 'shockwave';
  document.body.appendChild(sw);
  sw.addEventListener('animationend', () => sw.remove());
}

function createSparkles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 20; i++) {
    const spark = document.createElement('div');
    spark.className = 'sparkle';
    spark.style.left = cx + 'px';
    spark.style.top = cy + 'px';
    const angle = (Math.PI * 2 / 20) * i;
    const dist = randomBetween(80, 200);
    spark.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
    spark.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
    spark.style.background = ['#FFD700','#FFA500','#FF6347','#fff'][Math.floor(Math.random()*4)];
    document.body.appendChild(spark);
    spark.addEventListener('animationend', () => spark.remove());
  }
}

function spawnBill() {
  const bill = document.createElement('div');
  bill.className = 'bill';
  bill.textContent = BILLS[Math.floor(Math.random() * BILLS.length)];

  const x = randomBetween(5, 95);
  const duration = randomBetween(1.5, 3.5);
  const rot = randomBetween(-360, 360);
  const sc = randomBetween(0.6, 1.4);
  const delay = randomBetween(0, 0.8);
  const size = randomBetween(32, 64);

  bill.style.left = x + '%';
  bill.style.fontSize = size + 'px';
  bill.style.setProperty('--rot', rot + 'deg');
  bill.style.setProperty('--sc', sc);
  bill.style.animationDuration = duration + 's';
  bill.style.animationDelay = delay + 's';

  document.body.appendChild(bill);
  bill.addEventListener('animationend', () => bill.remove());
}

function rain(count) {
  for (let i = 0; i < count; i++) {
    spawnBill();
  }
}

function animateCounter(from, to) {
  const duration = 600;
  const start = performance.now();

  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
    const current = Math.round(from + (to - from) * eased);
    counterEl.textContent = current.toLocaleString('fr-FR') + ' €';
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function snap() {
  if (total >= TARGET) return;

  snapCount++;
  const prev = total;
  total = Math.min(total + PER_SNAP, TARGET);

  // Effects
  createFlash();
  createShockwave();
  createSparkles();
  document.body.classList.add('active');

  // Bill rain — more bills as we get closer to goal
  const intensity = Math.min(15 + snapCount * 5, 60);
  rain(intensity);

  // Counter
  counterEl.classList.add('visible');
  animateCounter(prev, total);

  // Hide hint after first snap
  hintEl.style.opacity = '0';

  // Vibrate if available
  if (navigator.vibrate) navigator.vibrate(50);

  // Check if done
  if (total >= TARGET) {
    setTimeout(() => {
      totalAmount.textContent = TARGET.toLocaleString('fr-FR') + ' €';
      totalReveal.classList.add('visible');
    }, 2500);
  }
}

function restart() {
  total = 0;
  snapCount = 0;
  counterEl.classList.remove('visible');
  counterEl.textContent = '0 €';
  totalReveal.classList.remove('visible');
  document.body.classList.remove('active');
  hintEl.style.opacity = '';
  // Remove leftover bills
  document.querySelectorAll('.bill').forEach(b => b.remove());
}

snapBtn.addEventListener('click', snap);

// Keyboard support — spacebar to snap
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !totalReveal.classList.contains('visible')) {
    e.preventDefault();
    snap();
  }
});
</script>
</body>
</html>
